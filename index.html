<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Partiu Rio</title>
  <meta name="description" content="Checklist turístico mobile first para organizar visitas no Rio de Janeiro.">
  <meta name="theme-color" content="#2f9bd8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    :root {
      --sky: #2f9bd8;
      --deep-sky: #1479ad;
      --sea: #14a7b8;
      --green: #2fb974;
      --sand: #f7ead2;
      --sun: #f4b23b;
      --sunset: #f47f45;
      --ink: #173143;
      --muted: #6d8291;
      --line: #d9e8ed;
      --surface: #ffffff;
      --soft: #eef8fa;
      --danger: #d86c4b;
      --shadow: 0 18px 45px rgba(28, 103, 137, 0.16);
      --radius: 24px;
      --radius-sm: 14px;
      --ring-size: 112px;
      font-family: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 80% -10%, rgba(244, 178, 59, 0.28), transparent 32rem),
        linear-gradient(180deg, #dff5fb 0%, #f9f3e7 54%, #f6fbfc 100%);
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 18px 16px 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 4px 0 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      color: #ffffff;
      background: linear-gradient(145deg, var(--sky), var(--green));
      box-shadow: 0 12px 24px rgba(20, 121, 173, 0.2);
    }

    .mini-status {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .hero-card,
    .panel,
    .region-card,
    .observations-card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-card {
      overflow: hidden;
      position: relative;
      padding: 22px;
      border-radius: 32px;
      margin-bottom: 14px;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -20% -55% -20%;
      height: 150px;
      background:
        radial-gradient(circle at 24% 35%, rgba(47, 185, 116, 0.35), transparent 12rem),
        linear-gradient(90deg, rgba(47, 155, 216, 0.2), rgba(244, 127, 69, 0.26));
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .hero-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.25rem, 13vw, 4.1rem);
      line-height: 0.93;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero-subtitle {
      max-width: 24rem;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
    }

    .hero-bottom {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .progress-wrap {
      position: relative;
      flex: 0 0 var(--ring-size);
      width: var(--ring-size);
      height: var(--ring-size);
    }

    .progress-ring {
      width: var(--ring-size);
      height: var(--ring-size);
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
    }

    .progress-bg {
      stroke: #deedf1;
    }

    .progress-value {
      stroke: url("#rioGradient");
      stroke-dasharray: 289;
      stroke-dashoffset: 289;
      transition: stroke-dashoffset 320ms ease;
    }

    .progress-label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .progress-number {
      display: block;
      color: var(--deep-sky);
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
    }

    .progress-copy {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .quick-links {
      display: grid;
      flex: 1;
      gap: 9px;
      min-width: 0;
    }

    .link-button,
    .action-button,
    .filter-chip,
    .copy-card-button,
    .clear-button,
    .map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .link-button {
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 16px;
      color: #ffffff;
      background: var(--ink);
      box-shadow: 0 12px 26px rgba(23, 49, 67, 0.18);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .link-button.secondary {
      color: var(--ink);
      background: #fff7e7;
      box-shadow: none;
    }

    .link-button:hover,
    .action-button:hover,
    .clear-button:hover,
    .copy-card-button:hover,
    .map-link:hover {
      transform: translateY(-1px);
    }

    .panel {
      padding: 14px;
      border-radius: var(--radius);
      margin: 12px 0;
    }

    .main-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .action-button {
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--sea), var(--green));
      box-shadow: 0 14px 28px rgba(20, 167, 184, 0.22);
      font-size: 0.93rem;
      font-weight: 800;
    }

    .clear-button {
      min-width: 48px;
      min-height: 48px;
      padding: 12px;
      border-radius: 18px;
      color: var(--danger);
      background: #fff1eb;
    }

    .filters {
      display: grid;
      gap: 10px;
    }

    .filter-row {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-chip {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #ffffff;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .filter-chip.major {
      min-height: 44px;
      padding: 11px 16px;
      color: var(--ink);
      font-size: 0.92rem;
      box-shadow: 0 10px 22px rgba(28, 103, 137, 0.08);
    }

    .filter-chip.active {
      border-color: transparent;
      color: #ffffff;
      background: var(--deep-sky);
      box-shadow: 0 12px 24px rgba(20, 121, 173, 0.18);
    }

    .filter-chip.danger.active {
      background: var(--danger);
    }

    .cards {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .region-card,
    .observations-card {
      overflow: hidden;
      border-radius: var(--radius);
    }

    .region-header,
    .observations-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
      padding: 16px;
    }

    .region-toggle,
    .observations-toggle {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .region-rank {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 15px;
      color: var(--deep-sky);
      background: #e7f6fb;
      font-size: 0.74rem;
      font-weight: 800;
    }

    .region-title {
      min-width: 0;
    }

    .region-title h2,
    .observations-title h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      font-weight: 800;
    }

    .region-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: #f1f7f8;
      font-size: 0.69rem;
      font-weight: 800;
      line-height: 1;
    }

    .tag.done {
      color: #167a4f;
      background: #e3f8ed;
    }

    .tag.warn {
      color: #a74d31;
      background: #fff0e8;
    }

    .chevron {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 10px;
      color: var(--muted);
      background: #f6fafb;
      transition: transform 180ms ease;
    }

    .region-card.expanded .chevron,
    .observations-card.expanded .chevron {
      transform: rotate(180deg);
    }

    .copy-card-button {
      align-self: start;
      min-width: 42px;
      height: 42px;
      padding: 0 12px;
      border-radius: 15px;
      color: var(--deep-sky);
      background: #eaf7fb;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .copy-card-button.copied {
      color: #167a4f;
      background: #e3f8ed;
    }

    .region-body,
    .observations-body {
      display: none;
      padding: 0 16px 16px;
    }

    .region-card.expanded .region-body,
    .observations-card.expanded .observations-body {
      display: block;
    }

    .notice {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      margin: 0 0 10px;
      padding: 12px;
      border: 1px solid #ffe1c3;
      border-radius: var(--radius-sm);
      color: #8b4d22;
      background: #fff7ec;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.42;
    }

    .places {
      display: grid;
      gap: 8px;
    }

    .place {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
    }

    .place-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 11px;
    }

    .check-button {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2px solid #cfe3e9;
      border-radius: 999px;
      color: transparent;
      background: #ffffff;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .check-button.checked {
      border-color: var(--green);
      color: #ffffff;
      background: var(--green);
    }

    .place-name {
      width: 100%;
      padding: 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.28;
      cursor: pointer;
    }

    .place-name.checked {
      color: #78909d;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(47, 185, 116, 0.55);
    }

    .map-link {
      width: 36px;
      height: 36px;
      border-radius: 13px;
      color: var(--deep-sky);
      background: #e8f6fb;
    }

    .place-details {
      display: none;
      margin: 0;
      padding: 0 12px 12px 52px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .place.open .place-details {
      display: block;
    }

    .empty-state {
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 28px 18px;
      border: 1px dashed #c4dce3;
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.52);
      text-align: center;
      font-weight: 700;
    }

    .observations-title {
      min-width: 0;
    }

    .observations-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .observations-list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .observations-list li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border-radius: 16px;
      color: var(--muted);
      background: #f5fafb;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.42;
    }

    .observations-list .warning {
      color: #8b4d22;
      background: #fff7ec;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      max-width: min(320px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 16px;
      color: #ffffff;
      background: var(--ink);
      box-shadow: 0 18px 36px rgba(23, 49, 67, 0.2);
      font-size: 0.86rem;
      font-weight: 800;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke-width: 2.4;
    }

    .icon.small {
      width: 15px;
      height: 15px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .add-place-panel {
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .add-place-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 52px;
      padding: 14px;
      border: 1.5px dashed rgba(47, 155, 216, 0.55);
      border-radius: var(--radius);
      color: var(--deep-sky);
      background: rgba(47, 155, 216, 0.07);
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .add-place-button:hover {
      background: rgba(47, 155, 216, 0.13);
      border-color: var(--sky);
      transform: translateY(-1px);
    }

    .place.custom .place-row {
      background: linear-gradient(90deg, rgba(47, 155, 216, 0.05), transparent 70%);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
    }

    .place-remove {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }

    .place-remove:hover {
      color: var(--danger);
      background: #fff1eb;
    }

    .custom-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 999px;
      color: var(--deep-sky);
      background: #e7f6fb;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .region-card.custom .region-rank {
      color: #ffffff;
      background: linear-gradient(135deg, var(--sky), var(--sea));
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: end center;
      padding: 0;
      background: rgba(23, 49, 67, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: overlay-fade 200ms ease;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal {
      width: min(100%, 520px);
      max-height: 92vh;
      overflow-y: auto;
      padding: 22px 20px 26px;
      border-radius: 28px 28px 0 0;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbfc 100%);
      box-shadow: 0 -22px 60px rgba(23, 49, 67, 0.28);
      animation: modal-slide-up 280ms cubic-bezier(0.2, 0.85, 0.25, 1);
    }

    @keyframes modal-slide-up {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes overlay-fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .modal-header h2 {
      margin: 0;
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .modal-close {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 12px;
      color: var(--muted);
      background: #f1f7f8;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }

    .modal-close:hover {
      color: var(--ink);
      background: #e7f1f3;
    }

    .modal-form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field[hidden] {
      display: none;
    }

    .field-label {
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .field-hint {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      color: var(--ink);
      background: #ffffff;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      transition: border-color 180ms ease, box-shadow 180ms ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .field select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236d8291' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 18px;
      padding-right: 40px;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--sky);
      box-shadow: 0 0 0 4px rgba(47, 155, 216, 0.14);
    }

    .field input::placeholder {
      color: #a8b8c2;
      font-weight: 600;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .modal-button {
      min-height: 48px;
      padding: 12px 18px;
      border: 0;
      border-radius: 16px;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .modal-button.primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--sea), var(--green));
      box-shadow: 0 14px 28px rgba(20, 167, 184, 0.22);
    }

    .modal-button.secondary {
      color: var(--ink);
      background: #f1f7f8;
    }

    .modal-button.danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--sunset), var(--danger));
      box-shadow: 0 14px 28px rgba(216, 108, 75, 0.28);
    }

    .modal.modal-compact {
      max-width: 420px;
    }

    .confirm-delete-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
    }

    .confirm-delete-text strong {
      color: var(--ink);
      font-weight: 800;
    }

    .modal-button:hover {
      transform: translateY(-1px);
    }

    @keyframes modal-fade-in {
      from { transform: translateY(20px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @media (min-width: 520px) {
      .app {
        padding-top: 28px;
      }

      .hero-content {
        grid-template-columns: 1fr;
      }

      .hero-bottom {
        justify-content: space-between;

    let memoryState = createDefaultState();
    let state = loadState();
    let feedbackTarget = "";
    let toastTimer = null;

    function createDefaultState() {
      return {
        visited: [],
        expanded: ["botafogo"],
        details: [],
        filters: [],
        customRegions: [],
        customPlaces: [],
        deletedDefaults: []
      };
    }

    function loadState() {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return createDefaultState();
        const parsed = JSON.parse(raw);
        return {
          ...createDefaultState(),
          ...parsed,
          visited: Array.isArray(parsed.visited) ? parsed.visited : [],
          expanded: Array.isArray(parsed.expanded) ? parsed.expanded : [],
          details: Array.isArray(parsed.details) ? parsed.details : [],
          filters: Array.isArray(parsed.filters) ? parsed.filters : [],
          customRegions: Array.isArray(parsed.customRegions) ? parsed.customRegions : [],
          customPlaces: Array.isArray(parsed.customPlaces) ? parsed.customPlaces : [],
          deletedDefaults: Array.isArray(parsed.deletedDefaults) ? parsed.deletedDefaults : []
        };
      } catch (error) {
        return memoryState;
      }
    }

    function saveState() {
      memoryState = JSON.parse(JSON.stringify(state));
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        showToast("Progresso salvo só nesta sessão.", true);
      }
    }

    function getRegioes() {
      const deleted = new Set(state.deletedDefaults || []);
      const merged = regioes.map((r) => ({
        ...r,
        locais: r.locais.filter((local) => !deleted.has(local.id))
      }));

      (state.customRegions || []).forEach((cr) => {
        merged.push({
          id: cr.id,
          nome: cr.nome,
          prox: "+",
          pertoAirbnb: false,
          todoDia: false,
          perigosa: false,
          aviso: "",
          isCustom: true,
          locais: []
        });
      });

      (state.customPlaces || []).forEach((cp) => {
        const region = merged.find((r) => r.id === cp.regiaoId);
        if (region) {
          region.locais.push({
            id: cp.id,
            nome: cp.nome,
            mapsUrl: cp.mapsUrl || "",
            detalhes: cp.detalhes || "Adicionado por você.",
            isCustom: true
          });
        }
      });

      return merged;
    }

    function allPlaces() {
      return getRegioes().flatMap((regiao) => regiao.locais);
    }

    function isVisited(id) {
      return state.visited.includes(id);
    }

    function isExpanded(id) {
      return state.expanded.includes(id);
    }

    function isDetailOpen(id) {
      return state.details.includes(id);
    }

    function isRegionComplete(regiao) {
      return regiao.locais.length > 0 && regiao.locais.every((local) => isVisited(local.id));
    }

    function visitedCount(regiao) {
      return regiao.locais.filter((local) => isVisited(local.id)).length;
    }

    function toggleInArray(array, value) {
      return array.includes(value) ? array.filter((item) => item !== value) : [...array, value];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function copyTextForRegion(regiao) {
      const linhas = [regiao.nome];
      regiao.locais.forEach((local) => {
        linhas.push(`- ${local.nome} — ${local.mapsUrl || "Confirmar antes de ir"}`);
      });
      return linhas.join("\n");
    }

    function copyTextForAllRegions() {
      return getRegioes().map(copyTextForRegion).join("\n\n");
    }

    async function writeClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          return fallbackCopy(text);
        }
      }
      return fallbackCopy(text);
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-1000px";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();

      try {
        const copied = document.execCommand("copy");
        document.body.removeChild(textarea);
        return copied;
      } catch (error) {
        document.body.removeChild(textarea);
        return false;
      }
    }

    async function handleCopy(text, target) {
      const copied = await writeClipboard(text);
      if (!copied) {
        showToast("Não foi possível copiar.", false);
        return;
      }

      feedbackTarget = target;
      render();
      showToast("Copiado!", true);
      window.setTimeout(() => {
        if (feedbackTarget === target) {
          feedbackTarget = "";
          render();
        }
      }, 1400);
    }

    function showToast(message, ok) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.toggle("error", !ok);
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function matchesFilters(regiao) {
      const active = new Set(state.filters);

      if (active.has("toVisit") && isRegionComplete(regiao)) return false;
      if (active.has("visited") && !isRegionComplete(regiao)) return false;
      if (active.has("near") && !regiao.pertoAirbnb) return false;
      if (active.has("daily") && !regiao.todoDia) return false;
      if (active.has("attention") && !regiao.perigosa) return false;

      return true;
    }

    function renderTags(regiao) {
      const tags = [
        `<span class="tag">${visitedCount(regiao)}/${regiao.locais.length} locais</span>`,
        regiao.pertoAirbnb ? `<span class="tag"><i data-lucide="house" class="icon small" aria-hidden="true"></i>Perto do Airbnb</span>` : "",
        regiao.todoDia ? `<span class="tag"><i data-lucide="calendar-check" class="icon small" aria-hidden="true"></i>Todo dia</span>` : "",
        regiao.perigosa ? `<span class="tag warn"><i data-lucide="triangle-alert" class="icon small" aria-hidden="true"></i>Atenção no deslocamento</span>` : "",
        isRegionComplete(regiao) ? `<span class="tag done"><i data-lucide="circle-check" class="icon small" aria-hidden="true"></i>Visitado</span>` : ""
      ];
      return tags.filter(Boolean).join("");
    }

    function renderPlace(local) {
      const checked = isVisited(local.id);
      const open = isDetailOpen(local.id);
      const details = local.detalhes || "Confirmar antes de ir";
      const mapsUrl = local.mapsUrl || "";
      const link = mapsUrl
        ? `<a class="map-link" href="${escapeHtml(mapsUrl)}" target="_blank" rel="noopener noreferrer" aria-label="Abrir localização de ${escapeHtml(local.nome)}"><i data-lucide="map-pin" class="icon" aria-hidden="true"></i></a>`
        : `<span class="map-link" aria-label="Localização indisponível"><i data-lucide="map-pin-off" class="icon" aria-hidden="true"></i></span>`;

      const removeButton = `<button class="place-remove" type="button" data-action="remove-place" data-place-id="${escapeHtml(local.id)}" data-place-name="${escapeHtml(local.nome)}" aria-label="Remover ${escapeHtml(local.nome)}"><i data-lucide="x" class="icon small" aria-hidden="true"></i></button>`;

      return `
        <div class="place ${open ? "open" : ""} ${local.isCustom ? "custom" : ""}">
          <div class="place-row">
            <button class="check-button ${checked ? "checked" : ""}" type="button" data-action="toggle-visited" data-place-id="${escapeHtml(local.id)}" aria-label="${checked ? "Desmarcar" : "Marcar"} ${escapeHtml(local.nome)}">
              <i data-lucide="check" class="icon small" aria-hidden="true"></i>
            </button>
            <button class="place-name ${checked ? "checked" : ""}" type="button" data-action="toggle-details" data-place-id="${escapeHtml(local.id)}" aria-expanded="${open}">
              ${escapeHtml(local.nome)}
            </button>
            ${link}
            ${removeButton}
          </div>
          <p class="place-details">${escapeHtml(details)}</p>
        </div>
      `;
    }

    function renderRegion(regiao) {
      const expanded = isExpanded(regiao.id);
      const copied = feedbackTarget === regiao.id;
      const rankContent = regiao.isCustom
        ? `<i data-lucide="sparkles" class="icon small" aria-hidden="true"></i>`
        : escapeHtml(regiao.prox);
      return `
        <article class="region-card ${expanded ? "expanded" : ""} ${regiao.isCustom ? "custom" : ""}" id="card-${escapeHtml(regiao.id)}">
          <div class="region-header">
            <button class="region-toggle" type="button" data-action="toggle-region" data-region-id="${escapeHtml(regiao.id)}" aria-expanded="${expanded}">
              <span class="region-rank">${rankContent}</span>
              <span class="region-title">
                <h2>${escapeHtml(regiao.nome)}</h2>
                <span class="region-meta">${renderTags(regiao)}</span>
              </span>
              <span class="chevron" aria-hidden="true"><i data-lucide="chevron-down" class="icon small"></i></span>
            </button>
            <button class="copy-card-button ${copied ? "copied" : ""}" type="button" data-action="copy-region" data-region-id="${escapeHtml(regiao.id)}" aria-label="Copiar lista de ${escapeHtml(regiao.nome)}">
              <i data-lucide="${copied ? "check" : "copy"}" class="icon small" aria-hidden="true"></i>
              <span class="${copied ? "" : "sr-only"}">${copied ? "Copiado!" : "Copiar"}</span>
            </button>
          </div>
          <div class="region-body">
            ${regiao.aviso ? `<div class="notice"><i data-lucide="triangle-alert" class="icon small" aria-hidden="true"></i><span>${escapeHtml(regiao.aviso)}</span></div>` : ""}
            <div class="places">
              ${regiao.locais.length ? regiao.locais.map(renderPlace).join("") : `<p class="place-details" style="display:block;padding:8px 4px;">Nenhum lugar neste grupo ainda. Use “Adicionar lugar” para incluir o primeiro.</p>`}
            </div>
          </div>
        </article>
      `;
    }

    function renderObservations() {
      const expanded = isExpanded("observacoes-gerais");
      return `
        <article class="observations-card ${expanded ? "expanded" : ""}" id="observacoes-gerais">
          <div class="observations-header">
            <button class="observations-toggle" type="button" data-action="toggle-region" data-region-id="observacoes-gerais" aria-expanded="${expanded}">
              <span class="region-rank"><i data-lucide="info" class="icon small" aria-hidden="true"></i></span>
              <span class="observations-title">
                <h2>Observações gerais importantes</h2>
                <p>Referência sem checklist; não entra no progresso.</p>
              </span>
              <span class="chevron" aria-hidden="true"><i data-lucide="chevron-down" class="icon small"></i></span>
            </button>
          </div>
          <div class="observations-body">
            <ul class="observations-list">
              ${observacoes.map((item) => `
                <li class="${item.tipo === "warning" ? "warning" : ""}">
                  <i data-lucide="${item.tipo === "warning" ? "triangle-alert" : "info"}" class="icon small" aria-hidden="true"></i>
                  <span>${escapeHtml(item.texto)}</span>
                </li>
              `).join("")}
            </ul>
          </div>
        </article>
      `;
    }

    function renderEmpty() {
      return `
        <div class="empty-state">
          <i data-lucide="search-x" class="icon" aria-hidden="true"></i>
          <span>Nenhum bloco encontrado com esses filtros.</span>
        </div>
      `;
    }

    function renderFilters() {
      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.classList.toggle("active", state.filters.includes(button.dataset.filter));
      });
    }

    function renderProgress() {
      const total = allPlaces().length;
      const visited = allPlaces().filter((local) => isVisited(local.id)).length;
      const percentage = total ? Math.round((visited / total) * 100) : 0;
      const offset = RING_CIRCUMFERENCE - (percentage / 100) * RING_CIRCUMFERENCE;

      document.getElementById("progressNumber").textContent = `${percentage}%`;
      document.getElementById("progressCircle").style.strokeDasharray = RING_CIRCUMFERENCE;
      document.getElementById("progressCircle").style.strokeDashoffset = offset;
      document.getElementById("miniStatus").textContent = `${visited} de ${total}`;
      document.getElementById("copyAllLabel").textContent = feedbackTarget === "all" ? "Lista copiada" : "Copiar lista";
    }

    function render() {
      const cards = document.getElementById("cards");
      const filteredRegions = getRegioes().filter(matchesFilters);
      cards.innerHTML = `
        ${filteredRegions.length ? filteredRegions.map(renderRegion).join("") : renderEmpty()}
        ${renderObservations()}
      `;

      renderProgress();
      renderFilters();

      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    document.addEventListener("click", async (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;

      const action = target.dataset.action;

      if (action === "copy-all") {
        await handleCopy(copyTextForAllRegions(), "all");
        return;
      }

      if (action === "copy-region") {
        event.stopPropagation();
        const regiao = getRegioes().find((item) => item.id === target.dataset.regionId);
        if (regiao) await handleCopy(copyTextForRegion(regiao), regiao.id);
        return;
      }

      if (action === "clear-progress") {
        const confirmed = window.confirm("Limpar todo o progresso marcado?");
        if (!confirmed) return;
        state.visited = [];
        saveState();
        render();
        showToast("Progresso limpo.", true);
        return;
      }

      if (action === "filter") {
        const filter = target.dataset.filter;

        if (filter === "toVisit" && state.filters.includes("visited")) {
          state.filters = state.filters.filter((item) => item !== "visited");
        }

        if (filter === "visited" && state.filters.includes("toVisit")) {
          state.filters = state.filters.filter((item) => item !== "toVisit");
        }

        state.filters = toggleInArray(state.filters, filter);
        saveState();
        render();
        return;
      }

      if (action === "toggle-region") {
        state.expanded = toggleInArray(state.expanded, target.dataset.regionId);
        saveState();
        render();
        return;
      }

      if (action === "toggle-visited") {
        state.visited = toggleInArray(state.visited, target.dataset.placeId);
        saveState();
        render();
        return;
      }

      if (action === "toggle-details") {
        state.details = toggleInArray(state.details, target.dataset.placeId);
        saveState();
        render();
        return;
      }

      if (action === "open-add-place") {
        openAddPlaceModal();
        return;
      }

      if (action === "close-add-place") {
        closeAddPlaceModal();
        return;
      }

      if (action === "remove-place") {
        const placeId = target.dataset.placeId;
        const placeName = target.dataset.placeName || "este lugar";
        openConfirmDeleteModal(placeId, placeName);
        return;
      }

      if (action === "confirm-delete-yes") {
        confirmDeletePlace();
        return;
      }

      if (action === "confirm-delete-no") {
        closeConfirmDeleteModal();
        return;
      }
    });

    let pendingDeleteId = null;

    function openConfirmDeleteModal(placeId, placeName) {
      pendingDeleteId = placeId;
      const modal = document.getElementById("confirmDeleteModal");
      document.getElementById("confirmDeleteName").textContent = placeName;
      modal.removeAttribute("hidden");
      document.body.style.overflow = "hidden";
      if (window.lucide) {
        window.lucide.createIcons();
      }
      window.setTimeout(() => {
        const noBtn = document.getElementById("confirmDeleteNo");
        if (noBtn) noBtn.focus();
      }, 60);
    }

    function closeConfirmDeleteModal() {
      pendingDeleteId = null;
      const modal = document.getElementById("confirmDeleteModal");
      modal.setAttribute("hidden", "");
      document.body.style.overflow = "";
    }

    function confirmDeletePlace() {
      const placeId = pendingDeleteId;
      if (!placeId) {
        closeConfirmDeleteModal();
        return;
      }

      const isCustomPlace = (state.customPlaces || []).some((cp) => cp.id === placeId);

      if (isCustomPlace) {
        state.customPlaces = state.customPlaces.filter((cp) => cp.id !== placeId);
        // Remove grupos customizados vazios
        const usedRegionIds = new Set(state.customPlaces.map((cp) => cp.regiaoId));
        state.customRegions = (state.customRegions || []).filter((cr) => usedRegionIds.has(cr.id));
        state.expanded = state.expanded.filter((id) => {
          const stillExists = regioes.some((r) => r.id === id)
            || (state.customRegions || []).some((cr) => cr.id === id)
            || id === "observacoes-gerais";
          return stillExists;
        });
      } else {
        // Lugar padrão: marca como deletado para que getRegioes() o oculte
        if (!state.deletedDefaults.includes(placeId)) {
          state.deletedDefaults = [...state.deletedDefaults, placeId];
        }
      }

      state.visited = state.visited.filter((id) => id !== placeId);
      state.details = state.details.filter((id) => id !== placeId);

      saveState();
      render();
      closeConfirmDeleteModal();
      showToast("Lugar removido.", true);
    }

    function openAddPlaceModal() {
      const modal = document.getElementById("addPlaceModal");
      populateGroupSelector();
      document.getElementById("novoGrupoField").setAttribute("hidden", "");
      modal.removeAttribute("hidden");
      document.body.style.overflow = "hidden";
      if (window.lucide) {
        window.lucide.createIcons();
      }
      window.setTimeout(() => {
        const firstInput = modal.querySelector('input[name="nome"]');
        if (firstInput) firstInput.focus();
      }, 60);
    }

    function closeAddPlaceModal() {
      const modal = document.getElementById("addPlaceModal");
      modal.setAttribute("hidden", "");
      document.body.style.overflow = "";
      const form = document.getElementById("addPlaceForm");
      form.reset();
      document.getElementById("novoGrupoField").setAttribute("hidden", "");
    }

    function populateGroupSelector() {
      const select = document.getElementById("grupoSelect");
      const merged = getRegioes();
      const options = merged
        .map((r) => `<option value="${escapeHtml(r.id)}">${escapeHtml(r.nome)}</option>`)
        .join("");
      select.innerHTML = `
        ${options}
        <option value="__new__">+ Criar novo grupo</option>
      `;
    }

    function slugify(text) {
      return String(text)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "")
        .slice(0, 40) || "grupo";
    }

    document.getElementById("grupoSelect").addEventListener("change", (event) => {
      const novoGrupoField = document.getElementById("novoGrupoField");
      if (event.target.value === "__new__") {
        novoGrupoField.removeAttribute("hidden");
        window.setTimeout(() => {
          const input = novoGrupoField.querySelector("input");
          if (input) input.focus();
        }, 40);
      } else {
        novoGrupoField.setAttribute("hidden", "");
      }
    });

    document.getElementById("addPlaceModal").addEventListener("click", (event) => {
      if (event.target.id === "addPlaceModal") {
        closeAddPlaceModal();
      }
    });

    document.getElementById("confirmDeleteModal").addEventListener("click", (event) => {
      if (event.target.id === "confirmDeleteModal") {
        closeConfirmDeleteModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        const addModal = document.getElementById("addPlaceModal");
        if (!addModal.hasAttribute("hidden")) {
          closeAddPlaceModal();
          return;
        }
        const confirmModal = document.getElementById("confirmDeleteModal");
        if (!confirmModal.hasAttribute("hidden")) {
          closeConfirmDeleteModal();
        }
      }
    });

    document.getElementById("addPlaceForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const form = event.target;
      const data = new FormData(form);

      const nome = (data.get("nome") || "").toString().trim();
      const mapsUrl = (data.get("mapsUrl") || "").toString().trim();
      let grupoId = (data.get("grupo") || "").toString();
      const novoGrupo = (data.get("novoGrupo") || "").toString().trim();

      if (!nome) {
        showToast("Informe o nome do lugar.", false);
        form.querySelector('input[name="nome"]').focus();
        return;
      }

      if (grupoId === "__new__") {
        if (!novoGrupo) {
          showToast("Informe o nome do novo grupo.", false);
          form.querySelector('input[name="novoGrupo"]').focus();
          return;
        }
        const baseId = `custom-${slugify(novoGrupo)}`;
        let candidateId = baseId;
        let suffix = 2;
        const existingIds = new Set([
          ...regioes.map((r) => r.id),
          ...(state.customRegions || []).map((r) => r.id)
        ]);
        while (existingIds.has(candidateId)) {
          candidateId = `${baseId}-${suffix++}`;
        }
        grupoId = candidateId;
        state.customRegions = [...(state.customRegions || []), { id: grupoId, nome: novoGrupo }];
      }

      const placeId = `custom-lugar-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
      state.customPlaces = [
        ...(state.customPlaces || []),
        {
          id: placeId,
          nome,
          mapsUrl,
          regiaoId: grupoId
        }
      ];

      if (!state.expanded.includes(grupoId)) {
        state.expanded = [...state.expanded, grupoId];
      }

      saveState();
      render();
      closeAddPlaceModal();
      showToast("Lugar adicionado!", true);

      window.setTimeout(() => {
        const card = document.getElementById(`card-${grupoId}`);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 100);
    });

    window.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
